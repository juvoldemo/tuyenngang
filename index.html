<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mô phỏng thu nhập Tiền Trưởng Nhóm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="mobile.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-icon">♟</span><span><b>MÔ PHỎNG THU NHẬP</b></span></div>
    <button id="resetBtn" class="ghost">↻ Đặt lại</button>
  </header>

  <main>
    <section class="stats" aria-label="Tổng quan">
      <article><i>♟</i><strong id="advisorCount">0</strong><span>TVV</span></article>
      <article><i>▥</i><strong id="totalFyp">0</strong><span>Tổng FYP</span><small>triệu đồng</small></article>
      <article class="accent"><i>🎁</i><strong id="ttnTotal">0</strong><span>Thưởng TTN</span></article>
      <article><i>↗</i><strong id="tvvTotal">0</strong><span>Thưởng TVV mới</span><small>Khoản của TVV</small></article>
    </section>

    <section class="workspace">
      <div class="section-head">
        <div><p class="eyebrow">MÔ PHỎNG ĐỘI NHÓM</p><h2>Doanh thu từng TVV</h2></div>
      </div>
      <div id="advisorList" class="advisor-list"></div>
    </section>

    <section class="results">
      <div class="section-head"><div><p class="eyebrow">CHI TIẾT THƯỞNG DỰ KIẾN</p><h2>Kết quả 6 tháng</h2></div></div>
      <div id="monthCards" class="month-grid"></div>
    </section>
  </main>
  <dialog id="advisorDialog" class="advisor-dialog">
    <form id="advisorForm" method="dialog">
      <div class="dialog-head"><div><h2 id="dialogTitle">Thêm TVV</h2></div><button type="button" class="dialog-close" id="closeDialog">×</button></div>
      <label class="name-field"><input id="dialogName" type="text" placeholder="Tên TVV" required></label>
      <div class="month-toolbar"><span>Chọn tháng có hợp đồng</span><button type="button" id="selectAllMonths">Tất cả</button></div>
      <div id="dialogMonths" class="dialog-months"></div>
      <div class="dialog-actions"><button type="button" class="ghost" id="cancelDialog">Hủy</button><button type="submit" class="primary">Lưu TVV</button></div>
    </form>
  </dialog>
  <dialog id="posterDialog" class="poster-dialog">
    <div class="poster-head"><h2 id="posterTitle">Chương trình thưởng</h2><button type="button" id="closePoster">×</button></div>
    <div class="poster-view"><img id="posterImage" alt="Poster chương trình thưởng"></div>
  </dialog>
  <footer>Dữ liệu được lưu trên trình duyệt này • Công cụ mô phỏng nội bộ</footer>
  <script src="app.js"></script>
</body>
</html>
